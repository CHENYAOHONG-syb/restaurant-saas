services:
  - type: web
    name: restaurant-saas
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python3 -m flask --app run.py db upgrade --directory migrations
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-saas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SITE_URL
        sync: false
      - key: BILLING_PROVIDER
        value: duitnow_manual
      - key: TRIAL_DAYS
        value: "14"

databases:
  - name: restaurant-saas-db
    plan: free
    region: singapore
