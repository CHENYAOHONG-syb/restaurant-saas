<!DOCTYPE html>
<html>

<head>

<title>Cart</title>

<style>

body{
font-family:Arial;
padding:20px;
}

.item{
border-bottom:1px solid #ddd;
padding:10px;
}

button{
padding:10px 15px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<h1>Your Cart</h1>

{% for item in items %}

<div class="item">

<h3>{{item.name}}</h3>

<p>Qty: {{item.qty}}</p>

</div>

{% endfor %}

<form action="/orders/checkout" method="POST">

<input type="hidden" name="restaurant_id" value="{{restaurant_id}}">
<input type="hidden" name="table" value="{{table}}">

<button>Checkout</button>

</form>

</body>

</html>
