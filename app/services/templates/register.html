<!DOCTYPE html>
<html>

<head>

<title>Restaurant Signup</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#2ecc71;
color:white;
border:none;
padding:10px;
width:100%;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">

<button>Create Account</button>

</form>

</div>

</body>

</html>
