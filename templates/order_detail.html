{% extends "admin_layout.html" %}

{% block content %}

<h1>Order #{{order.id}}</h1>

<p><b>Table:</b> {{order.table_number}}</p>
<p><b>Status:</b> {{order.status}}</p>
<p><b>Time:</b> {{order.created_at}}</p>

<h2>Items</h2>

<table border="1" width="100%" cellpadding="10">

<tr>
<th>Food</th>
<th>Quantity</th>
<th>Price</th>
</tr>

{% for item in items %}

<tr>

<td>{{item.name}}</td>

<td>{{item.qty}}</td>

<td>RM {{item.price}}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
