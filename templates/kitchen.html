<!DOCTYPE html>
<html>

<head>

<title>Kitchen</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

.order{

background:#222;
padding:20px;
margin-bottom:15px;
border-radius:10px;

}

button{

padding:10px;
margin-top:10px;

background:#00cc66;

border:none;

color:white;

border-radius:5px;

}

</style>

</head>

<body>

<h1>Kitchen Orders</h1>

<div id="orders"></div>

<script>

async function loadOrders(){

const res = await fetch("/api/orders/1")

const data = await res.json()

const container = document.getElementById("orders")

container.innerHTML=""

data.orders.forEach(order => {

container.innerHTML += `

<div class="order">

<h3>Table ${order.table}</h3>

<p>${order.name}</p>

<form action="/done/${order.id}" method="POST">

<button>DONE</button>

</form>

</div>

`

})

}

setInterval(loadOrders,2000)

loadOrders()

</script>

</body>

</html>
