<!DOCTYPE html>
<html>

<head>

<title>Kitchen Display</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
font-size:40px;
margin-bottom:30px;
}

#orders{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.order{
background:#222;
padding:25px;
border-radius:10px;
border-left:8px solid #00cc66;
}

.table{
font-size:30px;
font-weight:bold;
}

.timer{
color:orange;
margin-bottom:10px;
}

.food{
font-size:22px;
margin-bottom:4px;
}

button{
padding:12px;
font-size:18px;
background:#00cc66;
border:none;
color:white;
border-radius:5px;
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<h1>Kitchen Orders</h1>

<div id="orders"></div>

<script>

const restaurant_id = {{restaurant_id}}

let lastOrderCount = 0

async function loadOrders(){

const res = await fetch(`/api/orders/${restaurant_id}`)
const data = await res.json()

const container = document.getElementById("orders")

container.innerHTML=""

data.orders.forEach(order => {

let foods=""

order.items.forEach(item => {

foods+=`<div class="food">• ${item.name}</div>`

})

container.innerHTML+=`

<div class="order">

<div class="table">
Table ${order.table}
</div>

<div class="timer">
Time: ${order.time}
</div>

${foods}

<form action="/done/${order.items[0].id}" method="POST">

<button>DONE</button>

</form>

</div>

`

})

if(data.orders.length > lastOrderCount){

alert("🔔 New Order!")

const audio = new Audio("/static/alert.mp3")
audio.play()

}

lastOrderCount=data.orders.length

}

setInterval(loadOrders,2000)

loadOrders()

document.body.onclick=()=>{
document.documentElement.requestFullscreen()
}

</script>

</body>

</html>
