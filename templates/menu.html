<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Restaurant Menu</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:10px;
}

.food{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.food img{
width:100%;
border-radius:10px;
}

.price{
color:green;
font-weight:bold;
}

button{
background:#ff6b00;
color:white;
border:none;
padding:10px;
border-radius:5px;
width:100%;
margin-top:10px;
font-size:16px;
}

</style>

</head>

<body>

<h2>Restaurant Menu</h2>

{% for food in foods %}

<div class="food">

<img src="https://via.placeholder.com/300">

<h3>{{food.name}}</h3>

<p class="price">RM {{food.price}}</p>

<form action="/add_to_cart" method="POST">

<input type="hidden" name="food_id" value="{{food.id}}">
<input type="hidden" name="table" value="{{table}}">

<button>Add to Cart</button>

</form>

</div>

{% endfor %}

</body>

</html>
