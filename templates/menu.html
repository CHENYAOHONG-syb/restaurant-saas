<!DOCTYPE html>
<html>

<head>

<title>Menu</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:10px;
}

.food-card{

background:white;
border-radius:12px;
margin-bottom:15px;
padding:15px;

box-shadow:0 2px 5px rgba(0,0,0,0.1);

}

.food-name{

font-size:20px;
font-weight:bold;

}

.food-price{

color:green;
margin-top:5px;

}

button{

margin-top:10px;
padding:10px;

width:100%;

background:#ff6600;

color:white;

border:none;

border-radius:8px;

font-size:16px;

}

</style>

</head>

<body>

<h2>Menu</h2>

{% for food in foods %}

<div class="food-card">

<div class="food-name">
{{food.name}}
</div>

<div class="food-price">
RM {{food.price}}
</div>

<form action="/add_to_cart" method="POST">

<input type="hidden" name="food_id" value="{{food.id}}">
<input type="hidden" name="table" value="{{table}}">
<input type="hidden" name="restaurant_id" value="{{restaurant_id}}">

<button>Add to Cart</button>

</form>

</div>

{% endfor %}

</body>

</html>
