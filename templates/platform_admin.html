<!DOCTYPE html>
<html>

<head>

<title>Platform Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}

h1{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.number{
font-size:32px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Platform Admin Dashboard</h1>

<div class="grid">

<div class="card">

<div class="number">{{restaurants}}</div>

Restaurants

</div>

<div class="card">

<div class="number">{{orders}}</div>

Total Orders

</div>

<div class="card">

<div class="number">RM {{revenue}}</div>

Total Revenue

</div>

</div>

</body>

</html>
