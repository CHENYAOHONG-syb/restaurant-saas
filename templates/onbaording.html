<!DOCTYPE html>
<html>

<head>

<title>Restaurant Setup</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:30px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

h1{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#2ecc71;
border:none;
color:white;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Create Your Restaurant</h1>

<form method="POST">

<input type="text" name="name" placeholder="Restaurant Name">

<input type="text" name="slug" placeholder="Restaurant URL (example: cafe123)">

<button>Create Restaurant</button>

</form>

</div>

</body>

</html>
