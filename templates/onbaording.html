{% extends "public_form.html" %}

{% block title %}Restaurant Onboarding{% endblock %}

{% block top_actions %}
<a class="btn btn-secondary" href="/">Back Home</a>
<a class="btn btn-secondary" href="/auth/login">Owner Login</a>
{% endblock %}

{% block form_content %}
<h2 class="mb-1">Restaurant Onboarding</h2>
<p class="text-muted mb-4">Create the restaurant workspace before setting up owners, menus, and live ordering.</p>

<form method="post" data-loading-label="Creating...">
    <div class="mb-3">
        <label class="form-label" for="legacy-name">Restaurant Name</label>
        <input class="form-control" id="legacy-name" type="text" name="name" placeholder="Harbor Coffee House" required>
    </div>
    <div class="mb-3">
        <label class="form-label" for="legacy-slug">Restaurant URL slug</label>
        <input class="form-control" id="legacy-slug" type="text" name="slug" placeholder="harbor-coffee-house" required>
    </div>
    <div class="d-flex justify-content-end">
        <button class="btn btn-primary" type="submit">Create Restaurant</button>
    </div>
</form>
{% endblock %}
