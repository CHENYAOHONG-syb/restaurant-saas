<!DOCTYPE html>
<html>

<head>

<title>Restaurant Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<h1>Restaurant Dashboard</h1>

<div class="card">
<h2>Total Orders: {{total_orders}}</h2>
</div>

<div class="card">
<h2>Total Sales: RM {{total_sales}}</h2>
</div>

<div class="card">
<h2>Top Food</h2>

{% if top_food %}
<p>{{top_food.name}} ({{top_food.total}} orders)</p>
{% else %}
<p>No orders yet</p>
{% endif %}

</div>

<div class="card">

<h2>Sales Chart</h2>

<canvas id="salesChart"></canvas>

</div>

<script>

const ctx = document.getElementById('salesChart');

new Chart(ctx, {

type: 'bar',

data: {

labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],

datasets: [{

label: "Orders",

data: [12,19,3,5,2,3,9],

borderWidth: 1

}]

},

options: {

scales: {

y: {

beginAtZero: true

}

}

}

});

</script>

</body>

</html>
